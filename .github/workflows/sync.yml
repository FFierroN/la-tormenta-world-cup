name: Sincronizar resultados (worldcup26.ir -> Supabase)

# Robot centralizado. NO corre en el navegador de los amigos.
# Las llaves van como SECRETOS del repo (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY
# (worldcup26.ir no requiere API key)

on:
  workflow_dispatch:           # permite correrlo a mano desde la pestana Actions
    inputs:
      modo:
        description: "auto = normal | todos = re-sincroniza los 104 partidos (corrige nombres de goleadores)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - todos
  schedule:
    # Cada 5 min, las 24h, SOLO en junio/julio (el Mundial 2026).
    # Repo PUBLICO = minutos de Actions ILIMITADOS.
    # worldcup26.ir: gratis, sin auth, sin tope conocido. Por corrida hacemos
    # 1 request (trae los 104 partidos en un JSON). El auto-gatillo pregunta
    # gratis a Supabase y si no hay partidos en vivo ni por empezar, sale sin
    # tocar la API (0 requests).
    - cron: "*/5 * * 6,7 *"

concurrency:
  group: sync-resultados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Correr robot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: ${{ github.event.inputs.modo || 'auto' }}
        run: python robot/actualizar.py
