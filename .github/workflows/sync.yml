name: Enriquecer eventos (Highlightly -> Supabase)

# Robot POST-PARTIDO. NO corre en el navegador de los amigos.
# Secretos del repo (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, HIGHLIGHTLY_KEY
#
# Reparto de tareas (desde 2026-06-12):
#   - Marcador + goles EN VIVO  -> Cloudflare Worker (worker-vivo/), cron 1 min.
#     (El cron de GitHub se estrangulaba en horas pico y perdia frescura.)
#   - Enriquecimiento al FINAL  -> ESTE workflow: asistencias, tarjetas y stats
#     desde Highlightly. No necesita frescura; 1 request por partido finalizado
#     (free 100/dia). El auto-gatillo solo gasta cuando hay finales pendientes.

on:
  workflow_dispatch:           # permite correrlo a mano desde la pestana Actions
    inputs:
      modo:
        description: "auto = normal | todos = re-enriquece TODOS los partidos"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - todos
  schedule:
    # Cada 10 min, las 24h, SOLO en junio/julio (el Mundial 2026).
    # No es critico que sea puntual: enriquece los partidos ya finalizados.
    - cron: "*/10 * * 6,7 *"

concurrency:
  group: enriquecer-eventos
  cancel-in-progress: false

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Enriquecer eventos al final (Highlightly)
        if: ${{ env.HIGHLIGHTLY_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: ${{ github.event.inputs.modo || 'auto' }}
        run: python robot/enriquecer.py
