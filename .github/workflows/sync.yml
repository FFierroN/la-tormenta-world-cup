name: Enriquecer eventos (Highlightly -> Supabase) [RESPALDO MANUAL]

# Robot POST-PARTIDO. NO corre en el navegador de los amigos.
# Secretos del repo (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, HIGHLIGHTLY_KEY
#
# Reparto de tareas (desde 2026-06-12, actualizado):
#   - Marcador + goles EN VIVO  -> Cloudflare Worker (worker-vivo/), cron 1 min.
#   - Enriquecimiento HT + FT   -> TAMBIEN el Worker (worker-vivo/enriquecer.js),
#     en el mismo cron. Llama a Highlightly a medio tiempo y al final.
#
# Por eso el CRON de este workflow esta DESACTIVADO: solo queda el disparo
# manual (workflow_dispatch) como respaldo, util sobre todo para el modo
# 'todos' (re-enriquecer todos los partidos de una si algo se desincroniza).

on:
  workflow_dispatch:           # permite correrlo a mano desde la pestana Actions
    inputs:
      modo:
        description: "auto = normal | todos = re-enriquece TODOS los partidos"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - todos
      solo:
        description: "QUIRURGICO: texto de un partido (ej. 'jordania'). Re-enriquece SOLO ese (1 llamada a HL). Vacio = usar 'modo'."
        required: false
        default: ""
        type: string
  # schedule: DESACTIVADO -> el enriquecido automatico ahora lo hace el Worker.

concurrency:
  group: enriquecer-eventos
  cancel-in-progress: false

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Enriquecer eventos al final (Highlightly)
        if: ${{ env.HIGHLIGHTLY_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: ${{ github.event.inputs.modo || 'auto' }}
          SOLO: ${{ github.event.inputs.solo || '' }}
          MAX_HL: "40"   # tope de llamadas a HL por corrida (red de seguridad)
        run: python robot/enriquecer.py
