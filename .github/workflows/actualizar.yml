name: Actualizar marcador y goles (worldcup26 -> Supabase) [GRATIS, sin Highlightly]

# Robot de marcador + goleadores desde worldcup26.ir.
#
# IMPORTANTE: worldcup26.ir es GRATIS y SIN auth -> NO consume nada de la cuota
# de Highlightly (100/dia). Una sola llamada trae los 104 partidos del Mundial.
#
# Reparto de tareas:
#   - EN VIVO (cada 1 min): lo hace el Cloudflare Worker (worker-vivo/).
#   - Este workflow es un DISPARO MANUAL de respaldo / recuperacion. Util sobre
#     todo con modo=todos para re-sincronizar goleadores de partidos viejos
#     (incluye autogoles "(OG)" y penales "(p)" del feed) sin gastar Highlightly.
#     Ej.: recuperar el penal + autogol de Austria vs Jordania.
#
# Secretos del repo (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY   (NO necesita HIGHLIGHTLY_KEY)
#
# Sin schedule a proposito: el live ya lo cubre el Worker. Esto es solo a mano.

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "auto = solo partidos de hoy +/-1d | todos = re-sincroniza los 104 (gratis)"
        required: false
        default: "todos"
        type: choice
        options:
          - todos
          - auto

concurrency:
  group: actualizar-marcador
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Actualizar marcador y goles (worldcup26, sin Highlightly)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: ${{ github.event.inputs.modo || 'todos' }}
        run: python robot/actualizar.py
