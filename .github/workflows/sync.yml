name: Sincronizar resultados (API-Football -> Supabase)

# Robot centralizado. NO corre en el navegador de los amigos.
# Las llaves van como SECRETOS del repo (Settings -> Secrets -> Actions):
#   APIFOOTBALL_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY

on:
  workflow_dispatch: {}        # permite correrlo a mano desde la pestana Actions
  schedule:
    # Cada 15 min, SOLO dentro de la ventana real de partidos y SOLO en
    # junio/julio (el Mundial 2026). Asi ahorramos minutos de GitHub Actions
    # (repo privado = 2000 min/mes; GitHub cobra cada corrida redondeada a 1 min).
    #
    # Los partidos van de 11:00 a ~02:00 hora de Chile (UTC-4).
    # En UTC eso es 15:00 -> 06:00. El cron de GitHub corre en UTC:
    #   - 15-23 UTC  = 11:00-19:00 Chile
    #   - 00-06 UTC  = 20:00-02:00 Chile (madrugada, cierra los partidos tardios)
    # Horas muertas 07-14 UTC (03:00-10:00 Chile): el bot duerme, 0 minutos.
    #
    # La guardia de cuota del robot evita pasar de 100 req/dia a la API.
    # Y el AUTO-GATILLO hace que, dentro de la ventana, si no hay partidos en
    # vivo ni por empezar, salga sin tocar la API (0 requests).
    - cron: "*/15 15-23 * 6,7 *"
    - cron: "*/15 0-6 * 6,7 *"

# Evita que dos corridas se pisen
concurrency:
  group: sync-resultados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Correr robot
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: hoy
        run: python robot/actualizar.py
