name: Sincronizar resultados (football-data.org -> Supabase)

# Robot centralizado. NO corre en el navegador de los amigos.
# Las llaves van como SECRETOS del repo (Settings -> Secrets -> Actions):
#   FOOTBALL_DATA_TOKEN, SUPABASE_URL, SUPABASE_SERVICE_KEY

on:
  workflow_dispatch: {}        # permite correrlo a mano desde la pestana Actions
  schedule:
    # Cada 5 min, las 24h, SOLO en junio/julio (el Mundial 2026).
    # Repo PUBLICO = minutos de Actions ILIMITADOS.
    # football-data.org free: 10 req/min, sin tope diario. El auto-gatillo
    # pregunta GRATIS a Supabase y si no hay partidos en vivo ni por empezar
    # sale sin tocar la API (0 requests). Por corrida hacemos 2-5 req max,
    # asi que estamos comodos bajo el limite incluso con varios partidos.
    - cron: "*/5 * * 6,7 *"

concurrency:
  group: sync-resultados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Correr robot
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python robot/actualizar.py
