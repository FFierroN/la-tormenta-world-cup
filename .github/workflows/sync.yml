name: Sincronizar resultados (API-Football -> Supabase)

# Robot centralizado. NO corre en el navegador de los amigos.
# Las llaves van como SECRETOS del repo (Settings -> Secrets -> Actions):
#   APIFOOTBALL_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY

on:
  workflow_dispatch: {}        # permite correrlo a mano desde la pestana Actions
  schedule:
    # Cada 15 min, las 24h, SOLO en junio/julio (el Mundial 2026).
    # Repo PUBLICO = minutos de Actions ILIMITADOS, asi que ya no hace falta
    # acotar por hora: corremos todo el dia para cero riesgo de que un partido
    # en alargue/penales caiga fuera de una ventana. Fuera de jun/jul no corre.
    #
    # Igual sigue siendo barato en API: el AUTO-GATILLO pregunta GRATIS a
    # Supabase y, si no hay partidos en vivo ni por empezar, sale sin tocar la
    # API (0 requests). La guardia de cuota frena en 95/100 req/dia.
    - cron: "*/15 * * 6,7 *"

# Evita que dos corridas se pisen
concurrency:
  group: sync-resultados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Correr robot
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: hoy
        run: python robot/actualizar.py
