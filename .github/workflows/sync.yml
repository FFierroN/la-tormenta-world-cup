name: Sincronizar resultados (API-Football -> Supabase)

# Robot centralizado. NO corre en el navegador de los amigos.
# Las llaves van como SECRETOS del repo (Settings -> Secrets -> Actions):
#   APIFOOTBALL_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY

on:
  workflow_dispatch: {}        # permite correrlo a mano desde la pestana Actions
  schedule:
    # Cada 15 min. GitHub puede atrasarlo unos minutos (normal en plan gratis).
    # La guardia de cuota del robot evita pasar de 100 req/dia.
    # Ademas el robot tiene AUTO-GATILLO: si no hay partidos en vivo ni por
    # empezar, sale sin tocar la API (0 requests). Eso da la "ventana movil"
    # automatica (se ajusta sola por jornada y por fase).
    # TODO (cuando confirmemos la zona horaria del fixture): acotar el cron a la
    # ventana real de partidos (~14h) para ahorrar minutos de GitHub Actions.
    - cron: "*/15 * * * *"

# Evita que dos corridas se pisen
concurrency:
  group: sync-resultados
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Correr robot
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: hoy
        run: python robot/actualizar.py
