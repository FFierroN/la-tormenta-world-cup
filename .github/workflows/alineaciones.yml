name: Cargar alineaciones (Highlightly -> Supabase)

# Robot PRE-PARTIDO dedicado a alineaciones (formacion + 11 + banca).
#
# DESDE 2026-06-22: las alineaciones las carga el Cloudflare Worker
# (worker-vivo/src/alineaciones.js) en su cron de 1 min, con throttle de cuota.
# Motivo: el cron de GitHub Actions corria 1 vez por hora (pegado al minuto :00)
# y se atrasa/salta en horas pico -> los partidos que empiezan "en punto"
# recibian la alineacion al pitazo o despues. El Worker es cada 1 min y confiable.
#
# Por eso el CRON de aca esta DESACTIVADO: queda solo el disparo MANUAL
# (workflow_dispatch) como respaldo, util para backfill con modo=todos si el
# Worker se quedo corto de cuota algun dia.
#
# Secretos del repo (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, HIGHLIGHTLY_KEY
#
# Disparo:
#   - schedule cada 30 min: baja las alineaciones que ya entraron en ventana
#     (~90 min antes del pitazo). Si no hay partidos en ventana, 0 requests a HL.
#   - manual (workflow_dispatch): util para probar. modo=todos re-carga las de
#     todos los partidos ya relevantes (incluye los ya jugados).
#
# Nota: si el gasto de minutos de Actions molesta, baja la frecuencia del cron
# o (mejor a futuro) migra esta tarea al worker-vivo, que ya corre cada minuto.

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "auto = solo en ventana | todos = recarga todo lo relevante"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - todos
  # schedule DESACTIVADO -> las alineaciones ahora las carga el Worker (cada 1 min).
  # Si alguna vez quieres reactivar el respaldo automatico, descomenta:
  # schedule:
  #   - cron: "*/60 * * * *"

concurrency:
  group: cargar-alineaciones
  cancel-in-progress: false

jobs:
  alineaciones:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Cargar alineaciones (Highlightly)
        if: ${{ env.HIGHLIGHTLY_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: ${{ github.event.inputs.modo || 'auto' }}
          MAX_HL: "25"   # tope de llamadas a HL por corrida (red de seguridad)
        run: python robot/alineaciones.py
