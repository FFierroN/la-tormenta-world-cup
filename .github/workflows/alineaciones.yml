name: Cargar alineaciones (Highlightly -> Supabase)

# Robot PRE-PARTIDO dedicado a alineaciones (formacion + 11 + banca).
# Es una pieza NUEVA y aislada: el marcador/eventos en vivo los sigue
# manejando el Cloudflare Worker. Esto NO lo toca el worker.
#
# Secretos del repo (Settings -> Secrets -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, HIGHLIGHTLY_KEY
#
# Disparo:
#   - schedule cada 30 min: baja las alineaciones que ya entraron en ventana
#     (~90 min antes del pitazo). Si no hay partidos en ventana, 0 requests a HL.
#   - manual (workflow_dispatch): util para probar. modo=todos re-carga las de
#     todos los partidos ya relevantes (incluye los ya jugados).
#
# Nota: si el gasto de minutos de Actions molesta, baja la frecuencia del cron
# o (mejor a futuro) migra esta tarea al worker-vivo, que ya corre cada minuto.

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "auto = solo en ventana | todos = recarga todo lo relevante"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - todos
  schedule:
    - cron: "*/30 * * * *"   # cada 30 min

concurrency:
  group: cargar-alineaciones
  cancel-in-progress: false

jobs:
  alineaciones:
    runs-on: ubuntu-latest
    env:
      HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: robot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r robot/requirements.txt

      - name: Cargar alineaciones (Highlightly)
        if: ${{ env.HIGHLIGHTLY_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODO: ${{ github.event.inputs.modo || 'auto' }}
        run: python robot/alineaciones.py
